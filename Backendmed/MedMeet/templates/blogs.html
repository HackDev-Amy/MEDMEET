<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <title>MEDMEET-A COMPLETE HOSPITAL</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,500,600,700" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'adminfront/css/open-iconic-bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'adminfront/css/animate.css' %}">

    <link rel="stylesheet" href="{% static 'adminfront/css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'adminfront/css/owl.theme.default.min.css' %}">
    <link rel="stylesheet" href="{% static 'adminfront/css/magnific-popup.css' %}">

    <link rel="stylesheet" href="{% static 'adminfront/css/aos.css' %}">

    <link rel="stylesheet" href="{% static 'adminfront/css/ionicons.min.css' %}">

    <link rel="stylesheet" href="{% static 'adminfront/css/bootstrap-datepicker.css' %}">
    <link rel="stylesheet" href="{% static 'adminfront/css/jquery.timepicker.css' %}">


    <link rel="stylesheet" href="{% static 'adminfront/css/flaticon.css' %}">
    <link rel="stylesheet" href="{% static 'adminfront/css/icomoon.css' %}">
    <link rel="stylesheet" href="{% static 'adminfront/css/style.css' %}">
    <style>
        .blog-section {
            background-color: #f8f9fa;
            padding: 40px 0;
        }
        .post-entry {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .post-entry:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }
        .post-thumbnail {
            display: block;
            width: 100%;
            height: 250px;
            overflow: hidden;
            background-color: #e9ecef;
        }
        .post-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .post-entry:hover .post-thumbnail img {
            transform: scale(1.05);
        }
        .post-content-entry {
            padding: 20px;
        }
        .post-content-entry h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
            line-height: 1.4;
            min-height: 50px;
        }
        .post-content-entry .meta {
            font-size: 13px;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>

<body style=" width: 100%; height: 100%; background-image: linear-gradient(#ffffff 1.1rem, #ccc 1.2rem); background-size: 100% 1.2rem;">

    <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar bg-dark ftco-navbar-light" id="ftco-navbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'Med_Meet' %}">MED<span>MEET</span></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav"
                aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="oi oi-menu"></span> Menu
            </button>

            <div class="collapse navbar-collapse" id="ftco-nav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item "><a href="{% url 'Med_Meet' %}" class="nav-link">Home</a></li>
                    <li class="nav-item "><a href="{% url 'About_med' %}" class="nav-link">About</a></li>
                    <li class="nav-item active "><a href="{% url 'Blog_med' %}" class="nav-link">Blog</a></li>
                    <li class="nav-item"><a href="{% url 'Contacts_med' %}" class="nav-link">Contact</a></li>
                </ul>
                <!-- -------------------login icon --------------- -->
                <ul class="custom-navbar-cta navbar-nav mb-2 mb-md-0 ms-5">
                    <li><a class="nav-link" href="#"><img src="{% static 'adminfront/images/user.svg' %}"></a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- END nav -->

    <section class="home-slider owl-carousel">
        <div class="slider-item bread-item" style="background-image: url('{% static 'adminfront/images/bg_1.jpg' %}');"
            data-stellar-background-ratio="0.5">
            <div class="overlay"></div>
            <div class="container" data-scrollax-parent="true">
                <div class="row slider-text align-items-end">
                    <div class="col-md-7 col-sm-12 ftco-animate mb-5">
                        <p class="breadcrumbs" data-scrollax=" properties: { translateY: '70%', opacity: 1.6}"><span
                                class="mr-2"><a href="{% url 'Med_Meet' %}">Home</a></span>* <span>Blogs</span></p>
                        <h1 class="mb-3" data-scrollax=" properties: { translateY: '70%', opacity: .9}">BLOGS</h1>
                    </div>
                </div>
            </div>
        </div>
    </section><br><br>

<section>
    <div class="blog-section">
        <div class="container">
            <div class="row">
                {% for blogs in blog_profile %}
                <div class="col-12 col-sm-6 col-lg-4 mb-4">
                    <div class="post-entry">
                        <a href="{% url 'Blog1_med' blogs1_id=blogs.id %}" class="post-thumbnail">
                            {% if blogs.Bimage %}
                            <img src="{{blogs.Bimage.url}}" alt="{{ blogs.Btitle }}" />
                            {% else %}
                            <div style="width: 100%; height: 100%; background-color: #ddd; display: flex; align-items: center; justify-content: center; color: #999;">No Image</div>
                            {% endif %}
                        </a>
                        <div class="post-content-entry">
                            <h3>{{blogs.Btitle}}</h3>
                            <div class="meta">
                                <span>By {{blogs.Bwriter}}</span>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>


    <footer class="ftco-footer ftco-bg-dark ftco-section">
        <div class="container">
            <div class="row">
                <div class="col-md-12 text-center">

                    <p>
                        Copyright &copy;
                        <script>document.write(new Date().getFullYear());</script> All rights reserved | MEDMEET
                    </p>
                </div>
            </div>
        </div>
    </footer>



    <!-- loader -->
    <div id="ftco-loader" class="show fullscreen"><svg class="circular" width="48px" height="48px">
            <circle class="path-bg" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke="#eeeeee" />
            <circle class="path" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke-miterlimit="10"
                stroke="#F96D00" />
        </svg></div>

    <!-- Modal -->


    <script src="{% static 'adminfront/js/jquery.min.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery-migrate-3.0.1.min.js' %}"></script>
    <script src="{% static 'adminfront/js/popper.min.js' %}"></script>
    <script src="{% static 'adminfront/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery.easing.1.3.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery.waypoints.min.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery.stellar.min.js' %}"></script>
    <script src="{% static 'adminfront/js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery.magnific-popup.min.js' %}"></script>
    <script src="{% static 'adminfront/js/aos.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery.animateNumber.min.js' %}"></script>
    <script src="{% static 'adminfront/js/bootstrap-datepicker.js' %}"></script>
    <script src="{% static 'adminfront/js/jquery.timepicker.min.js' %}"></script>
    <script src="{% static 'adminfront/js/scrollax.min.js' %}"></script>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBVWaKrjvy3MaE7SQ74_uJiULgl1JY0H2s&sensor=false"></script>
    <script src="{% static 'adminfront/js/google-map.js' %}"></script>
    <script src="{% static 'adminfront/js/main.js' %}"></script>

</body>

</html>
